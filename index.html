<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GPS Hello AR</title>

  <!-- A-Frame + AR.js（location-based） -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- 設定 & カスタムコンポーネント -->
  <script src="config.js"></script>
  <script src="app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }

    /* 下部ヒント */
    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 15px;
      font-family: sans-serif;
      z-index: 999;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 距離バッジ */
    #distance-badge {
      position: fixed;
      top: 20px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      color: #7ef;
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 13px;
      font-family: monospace;
      z-index: 999;
      pointer-events: none;
    }

    /* 方向矢印インジケーター */
    #direction-indicator {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #direction-indicator.visible { opacity: 1; }

    #arrow-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #arrow-svg {
      width: 36px;
      height: 36px;
      transition: transform 0.3s ease;
    }
    #direction-label {
      font-size: 11px;
      font-family: sans-serif;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
    }

    /* iOSコンパス許可ボタン */
    #compass-btn {
      position: fixed;
      top: 20px;
      left: 16px;
      background: rgba(74,168,255,0.85);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-family: sans-serif;
      z-index: 999;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hint">GPS を取得中...</div>
  <div id="distance-badge"></div>

  <!-- デバッグ表示 -->
  <div id="debug-panel" style="
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #0f0; font-family: monospace; font-size: 11px;
    padding: 8px 14px; border-radius: 10px; z-index: 999;
    pointer-events: none; text-align: center; line-height: 1.6;
  ">GPS待機中...</div>

  <!-- 方向矢印 -->
  <div id="direction-indicator">
    <div id="arrow-ring">
      <svg id="arrow-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,2 28,28 18,22 8,28" fill="#4aa8ff"/>
        <polygon points="18,2 28,28 18,22 8,28" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <div id="direction-label">この方向</div>
  </div>

  <!-- iOS コンパス許可ボタン（必要な場合のみ表示） -->
  <button id="compass-btn">🧭 コンパスを許可</button>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false"
    renderer="antialias: true; alpha: true"
    embedded
  >
    <a-assets>
      <img id="bubble-img">
    </a-assets>

    <!-- テスト用: 現在地に巨大な赤球（GPS entityが動くか確認） -->
    <a-entity gps-entity-place="latitude: 35.621537; longitude: 139.696217">
      <a-sphere radius="20" color="red" material="shader: flat; opacity: 0.8"></a-sphere>
    </a-entity>

    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>
</body>
</html>
