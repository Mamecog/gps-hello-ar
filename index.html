<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GPS Hello AR</title>

  <!-- A-Frame + AR.js（location-based） -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <!-- 設定 & カスタムコンポーネント -->
  <script src="config.js"></script>
  <script src="app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }

    /* 起動オーバーレイ（iOSコンパス許可用） */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }
    #start-overlay p {
      color: #fff;
      font-family: sans-serif;
      font-size: 16px;
      text-align: center;
      padding: 0 32px;
      line-height: 1.7;
    }
    #start-btn {
      background: #4aa8ff;
      color: #fff;
      border: none;
      padding: 16px 40px;
      border-radius: 28px;
      font-size: 18px;
      font-family: sans-serif;
      cursor: pointer;
    }

    /* 下部ヒント */
    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 15px;
      font-family: sans-serif;
      z-index: 999;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 距離バッジ */
    #distance-badge {
      position: fixed;
      top: 20px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      color: #7ef;
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 13px;
      font-family: monospace;
      z-index: 999;
      pointer-events: none;
    }

    /* 方向矢印インジケーター */
    #direction-indicator {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #direction-indicator.visible { opacity: 1; }

    #arrow-ring {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #arrow-svg {
      width: 36px;
      height: 36px;
      transition: transform 0.3s ease;
    }
    #direction-label {
      font-size: 11px;
      font-family: sans-serif;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
    }

    /* デバッグ表示 */
    #debug-panel {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px 14px;
      border-radius: 10px;
      z-index: 999;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- 起動オーバーレイ: タップでカメラ・コンパス許可を一括取得 -->
  <div id="start-overlay">
    <p>カメラとコンパスの使用を許可して<br>ARを開始します</p>
    <button id="start-btn">タップして開始</button>
  </div>

  <div id="hint">GPS を取得中...</div>
  <div id="distance-badge"></div>
  <div id="debug-panel">GPS待機中...</div>

  <!-- 方向矢印 -->
  <div id="direction-indicator">
    <div id="arrow-ring">
      <svg id="arrow-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,2 28,28 18,22 8,28" fill="#4aa8ff"/>
        <polygon points="18,2 28,28 18,22 8,28" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <div id="direction-label">この方向</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false"
    renderer="antialias: true; alpha: true"
    embedded
  >
    <a-assets>
      <img id="bubble-img">
    </a-assets>

    <a-camera
      look-controls="deviceOrientationPermissionUI: false"
      rotation-reader>
    </a-camera>
  </a-scene>

  <script>
    // 許可済みならオーバーレイを即非表示
    if (sessionStorage.getItem('compassGranted')) {
      document.getElementById('start-overlay').style.display = 'none'
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const state = await DeviceOrientationEvent.requestPermission()
          if (state === 'granted') {
            // 許可後にリロード → AR.jsがコンパス付きで初期化される
            sessionStorage.setItem('compassGranted', '1')
            location.reload()
            return
          }
        } catch (e) { console.warn(e) }
      }
      // Android・古いiOSはそのままオーバーレイを消す
      document.getElementById('start-overlay').style.display = 'none'
    })
  </script>
</body>
</html>
