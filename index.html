<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>顔AR ❤️</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    /* 起動オーバーレイ */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
    }
    #start-overlay p {
      color: #fff;
      font-family: sans-serif;
      font-size: 17px;
      text-align: center;
      line-height: 1.7;
    }
    #start-btn {
      background: #ff4d80;
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 32px;
      font-size: 20px;
      font-family: sans-serif;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    #status {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      padding: 10px 28px;
      border-radius: 24px;
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>
  <video id="video" playsinline muted></video>
  <canvas id="overlay"></canvas>

  <!-- iOSはユーザータップ後でないとカメラが起動できない -->
  <div id="start-overlay">
    <p>インカメラを使って<br>顔の上にハートを出します</p>
    <button id="start-btn">❤️ タップして開始</button>
  </div>

  <div id="status" style="display:none"></div>

<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'
const video   = document.getElementById('video')
const overlay = document.getElementById('overlay')
const statusEl = document.getElementById('status')
const ctx     = overlay.getContext('2d')

function showStatus(msg, autoHide = false) {
  statusEl.textContent = msg
  statusEl.style.display = 'block'
  statusEl.classList.remove('hidden')
  if (autoHide) {
    setTimeout(() => statusEl.classList.add('hidden'), 2800)
  }
}

// ============================================================
//  浮かぶハートのパーティクル
// ============================================================
const particles = []

function spawnHearts(cx, cy, faceW) {
  const n = 2 + Math.floor(Math.random() * 3)
  for (let i = 0; i < n; i++) {
    particles.push({
      x:    cx + (Math.random() - 0.5) * faceW * 0.6,
      y:    cy,
      vx:   (Math.random() - 0.5) * 1.8,
      vy:   -(1.8 + Math.random() * 2.5),
      size: faceW * (0.18 + Math.random() * 0.18),
      life: 1.0,
    })
  }
}

// ============================================================
//  レンダーループ（rAF 60fps）
// ============================================================
let latestDets = []

function renderLoop() {
  ctx.clearRect(0, 0, overlay.width, overlay.height)

  for (const det of latestDets) {
    const { x, y, width } = det.box
    const size = Math.round(width * 0.6)
    ctx.font         = `${size}px serif`
    ctx.textAlign    = 'center'
    ctx.textBaseline = 'bottom'
    ctx.globalAlpha  = 0.92
    ctx.fillText('❤️', x + width / 2, y - width * 0.05)
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]
    p.x    += p.vx
    p.y    += p.vy
    p.life -= 0.017
    if (p.life <= 0) { particles.splice(i, 1); continue }

    ctx.globalAlpha  = p.life * 0.85
    ctx.font         = `${Math.round(p.size)}px serif`
    ctx.textAlign    = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('❤️', p.x, p.y)
  }

  ctx.globalAlpha = 1
  requestAnimationFrame(renderLoop)
}

// ============================================================
//  顔検出ループ（非同期、約 15fps）
// ============================================================
const DET_OPTIONS = new faceapi.TinyFaceDetectorOptions({
  inputSize: 224,
  scoreThreshold: 0.45,
})

async function detectLoop() {
  let lastSpawn = 0
  while (true) {
    if (video.readyState >= 2) {
      try {
        const dets = await faceapi.detectAllFaces(video, DET_OPTIONS)
        latestDets = faceapi.resizeResults(dets, {
          width:  overlay.width,
          height: overlay.height,
        })
        const now = Date.now()
        if (latestDets.length > 0 && now - lastSpawn > 350) {
          lastSpawn = now
          for (const det of latestDets) {
            const { x, y, width } = det.box
            spawnHearts(x + width / 2, y, width)
          }
        }
      } catch (_) {}
    }
    await new Promise(r => setTimeout(r, 66))
  }
}

// ============================================================
//  初期化（タップ後に呼ばれる）
// ============================================================
async function init() {
  const startOverlay = document.getElementById('start-overlay')
  startOverlay.style.display = 'none'

  try {
    showStatus('モデルを読み込み中...')
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)

    showStatus('カメラを起動中...')
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    })
    video.srcObject = stream
    await video.play()

    // canvas を video のピクセル寸法に合わせる
    overlay.width  = video.videoWidth  || 640
    overlay.height = video.videoHeight || 480

    showStatus('顔を向けてください ❤️', true)

    renderLoop()
    detectLoop()

  } catch (err) {
    showStatus('エラー: ' + err.message)
    console.error(err)
  }
}

document.getElementById('start-btn').addEventListener('click', init)
</script>
</body>
</html>
