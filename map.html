<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR配置マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .num-icon {
      background: #4aa8ff;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const CENTER = [35.621528480897105, 139.69631896402305]

    const map = L.map('map').setView(CENTER, 20)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 22,
    }).addTo(map)

    // 中心マーカー（赤）
    L.circleMarker(CENTER, {
      radius: 10, color: '#ff4444', fillColor: '#ff4444', fillOpacity: 0.8, weight: 2
    }).addTo(map).bindPopup('中心座標<br>' + CENTER[0].toFixed(7) + ', ' + CENTER[1].toFixed(7))

    // AR配置ポイント
    const LAT_PER_M = 1 / 111000
    const LON_PER_M = 1 / (111000 * Math.cos(CENTER[0] * Math.PI / 180))
    const COLS = 4, ROWS = 10

    let num = 1
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const dx = (c - (COLS - 1) / 2) * 2
        const dy = (r - (ROWS - 1) / 2) * 2
        const lat = CENTER[0] + dy * LAT_PER_M
        const lon = CENTER[1] + dx * LON_PER_M

        const icon = L.divIcon({
          className: '',
          html: `<div class="num-icon">${num}</div>`,
          iconSize: [24, 24],
          iconAnchor: [12, 12],
        })

        L.marker([lat, lon], { icon })
          .addTo(map)
          .bindPopup(`No.${num}<br>${lat.toFixed(7)}, ${lon.toFixed(7)}<br>オフセット: 東${dx}m 北${dy}m`)

        num++
      }
    }

    // 範囲の外枠
    const allLats = []
    const allLons = []
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        allLats.push(CENTER[0] + ((r - (ROWS-1)/2) * 2) * LAT_PER_M)
        allLons.push(CENTER[1] + ((c - (COLS-1)/2) * 2) * LON_PER_M)
      }
    }
    const margin = 0.00005
    L.rectangle([
      [Math.min(...allLats) - margin, Math.min(...allLons) - margin],
      [Math.max(...allLats) + margin, Math.max(...allLons) + margin],
    ], { color: '#4aa8ff', weight: 1.5, fillOpacity: 0.05 }).addTo(map)
  </script>
</body>
</html>
